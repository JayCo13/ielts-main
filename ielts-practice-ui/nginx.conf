server { 
    listen 80; 
    server_name admin.thiieltstrenmay.com; 

    # Add MIME type configuration 
    include /etc/nginx/mime.types; 
    default_type application/octet-stream; 
    
    # Add ACME challenge location for Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
    }    
     # Add these headers
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;    

    # Hashed build assets: return a real 404 for a missing file instead of the
    # SPA index.html. This prevents a missing /assets/*.js from ever being served
    # as text/html (which would poison Cloudflare/browser caches and break the
    # ES-module load -> blank admin screen).
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api { 
        proxy_pass https://api.thiieltstrenmay.com; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
    } 
}
