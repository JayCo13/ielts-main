server { 
    listen 80; 
    server_name thiieltstrenmay.com; 

    # Add MIME type configuration 
    include /etc/nginx/mime.types; 
    default_type application/octet-stream; 
    
    # Add ACME challenge location for Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
    }    
     # Add these headers
    add_header X-Robots-Tag "index, follow" always;  
   
    # Hashed CRA build assets: return a real 404 for a missing file instead of the
    # SPA index.html, so a missing /static/*.js can never be served as text/html
    # (which would poison caches and break module loads).
    location /static/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api { 
        proxy_pass https://api.thiieltstrenmay.com; 
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr; 
    } 
}
