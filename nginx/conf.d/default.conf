# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name thiieltstrenmay.com admin.thiieltstrenmay.com api.thiieltstrenmay.com;
    # Add this block for ACME challenges
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    
    # Serve robots.txt from nginx directory
    location = /robots.txt {
        root /etc/nginx;
        access_log on;
        log_not_found on;
    }
    return 301 https://$host$request_uri;
}

# Main domain configuration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name thiieltstrenmay.com;

    ssl_certificate /etc/letsencrypt/live/thiieltstrenmay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thiieltstrenmay.com/privkey.pem;
  # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Add this block for ACME challenges
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    
    # Serve robots.txt from nginx directory
    location = /robots.txt {
        root /etc/nginx;
        access_log on;
        log_not_found on;
    }
    # Public SEO landing pages for full tests, server-rendered by the backend.
    # Indexable; routes through to the SPA "Làm bài" flow via /<skill>_list?open=<id>.
    location /de-thi {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "index, follow" always;
    }

    # Dynamic sitemap generated by the backend (lists every full-test landing
    # page). Overrides any static sitemap.xml baked into the SPA image.
    location = /sitemap.xml {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://user-ui:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add SEO headers for main site
        add_header X-Robots-Tag "index, follow" always;
    }
     location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Add debugging headers
        add_header X-Debug-Backend "reached" always;
    
        # Increase timeouts if needed
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;   
    }
}

# Admin subdomain configuration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.thiieltstrenmay.com;

    ssl_certificate /etc/letsencrypt/live/thiieltstrenmay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thiieltstrenmay.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Add this block for ACME challenges
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    
    # Serve admin-specific robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }
    location / {
        proxy_pass http://admin-ui:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Explicitly prevent search engines from indexing admin site
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API subdomain configuration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.thiieltstrenmay.com;
    client_max_body_size 10M;
    ssl_certificate /etc/letsencrypt/live/thiieltstrenmay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thiieltstrenmay.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
     ssl_session_timeout 10m;
    # Add this block for ACME challenges
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Serve custom robots.txt for API
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent search engines from indexing API
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
