user nginx;
worker_processes 12;  # Match your CPU cores
pid /var/run/nginx.pid;

events {
    worker_connections 10240;  # Increased for your 24GB RAM
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Rate limiting zones to prevent abuse
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name zone=perserver:10m;
    
    # Optimize for your 120GB SSD
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Enhanced TCP settings for 200Mbps domestic/30Mbps international bandwidth
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Enhanced connection handling for high traffic
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;
    reset_timedout_connection on;
    
    # Proxy Settings optimized for your RAM
    proxy_buffering on;
    proxy_buffers 32 32k;
    proxy_buffer_size 64k;
    proxy_max_temp_file_size 1024m;
    proxy_busy_buffers_size 128k;
    
    # Gzip Settings (beneficial for your bandwidth constraints)
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    
    # Cache Settings (utilizing your SSD)
    proxy_cache_path /tmp/cache levels=1:2 keys_zone=STATIC:20m max_size=20g inactive=60m use_temp_path=off;
    
    # Logging Settings (SSD optimized)
    access_log /var/log/nginx/access.log combined buffer=64k flush=5s;
    error_log /var/log/nginx/error.log warn;
    
    # Include all site configurations
    include /etc/nginx/conf.d/*.conf;
}
